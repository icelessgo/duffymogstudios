baseURL = "https://www.duffymogstudios.ie/"
languageCode = "en-ie"
title = "Duffymog Studios"
enableGitInfo = true

[params]
  description = "Wedding & Family Photographer Dublin & Ireland"
  google_site_verification = ""  # Paste your Google Search Console verification code here
  # phone = "+353XXXXXXXXX"  # Set this to enable telephone in LocalBusiness schema

[related]
  threshold = 80
  includeNewer = true
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "date"
    weight = 10

[imaging]
  quality = 80

[imaging.exif]
  disableLatLong = true

[markup.goldmark.renderer]
  unsafe = true
