<section class="testimonial-section reveal">
  <div class="testimonial-header">
    <h2>What Couples Say</h2>
    <div class="caveat-sub">all five-star Google reviews ✦</div>
  </div>
  <div class="testimonials-grid">
    {{ range where $.Site.Data.reviews "section" "wedding" }}
    <div class="testimonial-card">
      <div class="stars">{{ range seq .rating }}★{{ end }}</div>
      <blockquote>"{{ .text }}"</blockquote>
      <cite>— {{ .name }} ✦</cite>
    </div>
    {{ end }}
  </div>
  <div class="trust-badges">
    <div class="trust-badge"><span class="badge-icon">⭐</span> All Five-Star Google Reviews</div>
    <div class="trust-badge"><span class="badge-icon">🛡️</span> Insured up to €6.5M</div>
    <div class="trust-badge"><span class="badge-icon">🏛️</span> National Gallery Approved</div>
  </div>
</section>
