{{ if .IsHome }}
{{ $schemaImg := (resources.Get "images/couple-swoop.jpg").Resize "1200x webp q90" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "LocalBusiness",
  "name": "Duffymog Studios",
  "description": "{{ .Site.Params.description }}",
  "url": "{{ .Site.BaseURL }}",
  "image": "{{ $schemaImg.Permalink }}",
  "additionalType": "https://schema.org/Photographer",
  "address": {
    "@type": "PostalAddress",
    "addressLocality": "Dublin",
    "addressCountry": "IE"
  },
  "geo": {
    "@type": "GeoCoordinates",
    "latitude": "53.3498",
    "longitude": "-6.2603"
  },
  "areaServed": {
    "@type": "Country",
    "name": "Ireland"
  },
  "priceRange": "€400-€2,100",
  "aggregateRating": {
    "@type": "AggregateRating",
    "ratingValue": "5",
    "bestRating": "5",
    "worstRating": "1",
    "reviewCount": "29"
  },
  "sameAs": [
    "https://instagram.com/duffymogstudios"
  ]{{ with .Site.Params.phone }},
  "telephone": "{{ . }}"{{ end }}
}
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ .Site.Title }}",
  "url": "{{ .Site.BaseURL }}"
}
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ProfessionalService",
  "name": "Duffymog Studios",
  "description": "Candid, documentary-style wedding photography by Gabriela Duffy. Based in Dublin, travelling all of Ireland.",
  "url": "{{ .Site.BaseURL }}",
  "provider": {
    "@type": "Person",
    "name": "Gabriela Duffy",
    "jobTitle": "Wedding Photographer"
  },
  "serviceType": ["Wedding Photography", "Elopement Photography", "Engagement Photography"],
  "areaServed": {
    "@type": "Country",
    "name": "Ireland"
  }
}
</script>
{{ end }}

{{ if .Params.faq }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {{ range $i, $faq := .Params.faq }}{{ if $i }},{{ end }}
    {
      "@type": "Question",
      "name": {{ .question | jsonify }},
      "acceptedAnswer": {
        "@type": "Answer",
        "text": {{ .answer | jsonify }}
      }
    }
    {{ end }}
  ]
}
</script>
{{ end }}

{{ if and .IsPage (eq .Section "blog") }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": {{ .Title | jsonify }},
  "description": {{ .Description | jsonify }},
  "datePublished": "{{ .Date.Format "2006-01-02" }}",
  {{ with .Params.ogImage }}"image": "{{ (resources.Get (printf "images/%s" .)).Permalink }}",{{ end }}
  "author": {
    "@type": "Person",
    "name": "Gabriela Duffy"
  },
  "publisher": {
    "@type": "Organization",
    "name": "Duffymog Studios",
    "url": "{{ .Site.BaseURL }}"
  },
  "mainEntityOfPage": "{{ .Permalink }}"
}
</script>
{{ end }}
