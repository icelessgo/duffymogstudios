<nav>
  <a href="{{ "" | absURL }}" class="nav-logo">
    <img src="{{ "images/DuffymogStudios_Logo.png" | relURL }}" alt="Duffymog Studios" class="nav-logo-img" width="264" height="132">
  </a>
  <button class="nav-hamburger" aria-label="Toggle menu" aria-expanded="false" aria-controls="nav-links">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <div class="nav-links" id="nav-links">
    <button class="nav-close" aria-label="Close menu">✕</button>
    <a href="{{ "weddings/" | absURL }}">Weddings</a>
    <a href="{{ "pricing/" | absURL }}">Pricing</a>
    <a href="{{ "about/" | absURL }}">About</a>
    <a href="{{ "blog/" | absURL }}">Blog</a>
    <a href="{{ "faq/" | absURL }}">FAQs</a>
    <a href="{{ "contact/" | absURL }}" class="nav-cta">Say Hello!</a>
  </div>
</nav>

<script>
(function() {
  var btn = document.querySelector('.nav-hamburger');
  var links = document.getElementById('nav-links');
  if (!btn || !links) return;

  function closeMenu() {
    links.classList.remove('nav-open');
    btn.classList.remove('nav-open');
    btn.setAttribute('aria-expanded', 'false');
  }

  btn.addEventListener('click', function() {
    var open = links.classList.toggle('nav-open');
    btn.classList.toggle('nav-open', open);
    btn.setAttribute('aria-expanded', String(open));
  });

  document.querySelector('.nav-close').addEventListener('click', closeMenu);

  links.querySelectorAll('a').forEach(function(a) {
    a.addEventListener('click', closeMenu);
  });
})();
</script>
