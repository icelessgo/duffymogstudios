{{ define "main" }}
<section class="blog-section">
  <h1>{{ .Title | humanize | title }}</h1>
  <p class="tag-subtitle">{{ len .Pages }} {{ if eq (len .Pages) 1 }}post{{ else }}posts{{ end }} tagged "{{ .Title | humanize }}"</p>
  {{ range .Pages.ByDate.Reverse }}
  <div class="blog-post-card">
    <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
    <div class="post-date">{{ .Date.Format "2 January 2006" }}</div>
    <p class="post-excerpt">{{ .Description }}</p>
  </div>
  {{ end }}
  <a href="{{ "tags/" | relURL }}" class="back-link">← All Tags</a>
</section>
{{ end }}
